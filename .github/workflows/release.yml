name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, aang]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Get version
        id: version
        run: echo "version=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create zip
        if: steps.check.outputs.exists == 'false'
        run: cd dist && zip -r "../x-media-saver-${{ steps.version.outputs.version }}.zip" .

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: gh release create "${{ steps.version.outputs.version }}" "x-media-saver-${{ steps.version.outputs.version }}.zip" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
