name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    # Security fix #22: moved from self-hosted runner ('aang') to ubuntu-latest.
    # This is a public repo — running CI on a self-hosted runner means a
    # contributor with a compromised account could execute code on the homelab.
    # GitHub-hosted runners are ephemeral and isolated.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
